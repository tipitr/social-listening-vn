[server]
enableCORS = false
enableXsrfProtection = false

[browser]
serverAddress = "vowel-strongman-relearn.ngrok-free.dev"
serverPort = 443

# ── Brand theme — KBank Vietnam ─────────────────────────────────────────────
# Anchored on the public KBank brand green (#138F2D). Affects Streamlit-managed
# surfaces our HTML doesn't reach: sidebar buttons, focused-input rings, slider
# thumbs, radio dots, the active-tab underline, st.success/st.error accents.
# Custom HTML (cards, hero banner, badges) reads from dashboard/theme.py so the
# two stay in lockstep.

[theme]
base = "light"
primaryColor = "#138F2D"              # KBank green — buttons, focused inputs
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#F4F6F4"  # sidebar + card wells (warm-leaning grey)
textColor = "#1a1f2c"
font = "sans serif"
