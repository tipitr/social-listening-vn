# Vietnamese Banks Offering Home Loan Products
# Last updated: May 2026
# Sources: topi.vn, cafeland.vn, bankexpress.vn, individual bank websites
#
# Fields:
#   name_vi       — official Vietnamese name
#   name_en       — English name
#   short_name    — keyword used in news/forum monitoring
#   type          — state_owned | private | foreign
#   ownership     — ownership detail
#   product_name  — official home loan product name
#   promo_rate    — current advertised promotional rate (fixed period)
#   promo_period  — duration of promotional rate
#   floating_rate — floating rate after promo period (approx)
#   max_ltv       — max loan-to-value ratio (%)
#   max_term_yrs  — maximum loan term in years
#   website       — home loan product page
#   notes         — key differentiators / flags to watch

# ─────────────────────────────────────────────────
# STATE-OWNED BANKS (Big 4) — largest market share
# ─────────────────────────────────────────────────

state_owned:

  - name_vi: Ngân hàng TMCP Ngoại thương Việt Nam
    name_en: Bank for Foreign Trade of Vietnam
    short_name: Vietcombank
    aliases: [VCB, Vietcombank]
    type: state_owned
    ownership: State owns 74.8%
    product_name: Vay mua nhà / đất ở
    promo_rate: "9.6%/year"
    promo_period: "6 months fixed"
    floating_rate: "~13.9%/year (24-month fixed)"
    max_ltv: 80
    max_term_yrs: 30
    website: "https://www.vietcombank.com.vn/en/Personal/SPDV/Vay/Vay-mua-nha-dat"
    notes: >
      Most trusted brand in Vietnam. Premium segment customers.
      Strict income documentation. Monitor for rate change announcements.

  - name_vi: Ngân hàng TMCP Đầu tư và Phát triển Việt Nam
    name_en: Bank for Investment and Development of Vietnam
    short_name: BIDV
    aliases: [BIDV]
    type: state_owned
    ownership: State owns 80.9%
    product_name: Vay nhu cầu nhà ở
    promo_rate: "9.7%/year"
    promo_period: "6 months fixed"
    floating_rate: "~13.5%/year (18-month fixed)"
    max_ltv: 70
    max_term_yrs: 25
    website: "https://bidv.com.vn/vn/ca-nhan/san-pham-dich-vu/vay-ca-nhan/vay-nhu-cau-nha-o"
    notes: >
      Strong branch network in provinces. Often bundles with BIDV insurance.
      Watch for "Gói vay nhà ở" campaign announcements.

  - name_vi: Ngân hàng Nông nghiệp và Phát triển Nông thôn Việt Nam
    name_en: Vietnam Bank for Agriculture and Rural Development
    short_name: Agribank
    aliases: [Agribank, NHNo]
    type: state_owned
    ownership: State owns 100%
    product_name: Cho vay trung dài hạn mua nhà ở
    promo_rate: "8.0%/year"
    promo_period: "6 months fixed"
    floating_rate: "~9.8%/year (18-month fixed)"
    max_ltv: 70
    max_term_yrs: 25
    website: "https://www.agribank.com.vn"
    notes: >
      Largest branch network in Vietnam, dominant in rural/tier-2 cities.
      Lowest rates among Big 4. Key audience: first-time buyers outside HCMC/Hanoi.

  - name_vi: Ngân hàng TMCP Công Thương Việt Nam
    name_en: Vietnam Joint Stock Commercial Bank for Industry and Trade
    short_name: VietinBank
    aliases: [VietinBank, CTG]
    type: state_owned
    ownership: State owns 64.5%
    product_name: Cho vay mua nhà ở, đất ở
    promo_rate: "9.5%/year"
    promo_period: "6 months fixed"
    floating_rate: "~12.5%/year (24-month fixed)"
    max_ltv: 75
    max_term_yrs: 25
    website: "https://www.vietinbank.vn"
    notes: >
      Strong corporate client base. Watch for employee home loan packages
      tied to corporate payroll accounts.

